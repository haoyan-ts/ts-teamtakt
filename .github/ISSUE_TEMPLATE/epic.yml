name: Epic
description: A large body of work spanning multiple sprints or teams, defined at sprint planning
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for top-level initiatives. Epics are never children of another issue — they are broken down into stories, tasks, bugs, and sub-tasks.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is this epic about? What outcome does it deliver?
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: Goals & Success Criteria
      description: How will we know this epic is complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - auth
        - notifications
        - llm
        - infra
        - multiple
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-critical (system down / data loss)
        - P1-high
        - P2-medium
        - P3-low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Related epics, references, or background information.
