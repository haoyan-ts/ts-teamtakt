name: Story
description: A user-centric requirement or feature that delivers value
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for user-centric requirements and features that deliver direct value.

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [role], I want [feature] so that [benefit]."
      placeholder: "As a team leader, I want to see overload flags on the dashboard so that I can proactively support team members."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define the specific conditions that must be met for this feature to be considered complete.
      placeholder: |
        - [ ] Given X, when Y, then Z
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - auth
        - notifications
        - llm
        - infra
        - multiple
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-critical (system down / data loss)
        - P1-high
        - P2-medium
        - P3-low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, related issues, alternative approaches considered.
