name: Task / Chore
description: Tech debt, refactor, docs update, dependency upgrade, or other non-feature work
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for internal tasks that don't add user-visible features but improve quality, maintainability, or developer experience.

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      options:
        - refactor
        - tech-debt
        - docs
        - dependency-upgrade
        - test
        - ci-cd
        - infra
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why.
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] ...
        - [ ] Tests pass
        - [ ] No ruff / mypy / tsc errors
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - infra
        - ci-cd
        - docs
        - multiple
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1-high
        - P2-medium
        - P3-low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
