name: Task
description: A generic, actionable piece of work — tech debt, docs, dependency upgrade, test coverage, CI/CD, refactor, or other internal tasks
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for any actionable work that isn't a story, bug, or sub-task — including tech debt, refactoring, docs, CI/CD, dependency upgrades, and other internal tasks.

  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      options:
        - refactor
        - tech-debt
        - docs
        - dependency-upgrade
        - test
        - ci-cd
        - infra
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why.
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] ...
        - [ ] Tests pass
        - [ ] No ruff / mypy / tsc errors
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - infra
        - ci-cd
        - docs
        - multiple
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-critical (system down / data loss)
        - P1-high
        - P2-medium
        - P3-low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
