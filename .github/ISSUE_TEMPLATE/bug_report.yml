name: Bug
description: Report a reproducible defect, error, or fault in the product
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in all sections.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include screenshots or error messages if applicable.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - auth
        - notifications
        - llm
        - infra
        - unknown
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0-critical (system down / data loss)
        - P1-high (major feature broken)
        - P2-medium (degraded experience)
        - P3-low (minor / cosmetic)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "e.g. local dev, staging, production; OS; browser"
      placeholder: "local dev, Windows 11, Chrome 125"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, related issues, or other context.
