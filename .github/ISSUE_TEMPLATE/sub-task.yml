name: Sub-task
description: A small, discrete piece of work that breaks down a parent task or story
labels: ["sub-task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to break a story, task, or bug into smaller, estimable pieces. Every sub-task must be linked to a parent issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] ...
        - [ ] Tests pass
        - [ ] No ruff / mypy / tsc errors
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - backend
        - frontend
        - database
        - auth
        - notifications
        - llm
        - infra
        - multiple
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1-high
        - P2-medium
        - P3-low
    validations:
      required: true
